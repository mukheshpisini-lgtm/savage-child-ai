<!DOCTYPE html>
<html>
<head>
    <title>Savage Child AI</title>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; text-align:center; padding:50px; }
        input { background:#222; color:#0f0; border:1px solid #0f0; padding:10px; width:80%; }
        button { background:#0f0; color:#000; padding:10px; border:none; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <h1>SAVAGE CHILD AI ACTIVE 🚀</h1>
    <div id="out" style="height:200px; overflow:auto; margin:20px; border:1px solid #333; padding:10px;">
        System: Waiting for command, Kanna...
    </div>
    <input type="text" id="in" placeholder="Ask Savage Truth...">
    <button onclick="talk()">Execute</button>

    <script>
        function talk() {
            let i = document.getElementById('in').value;
            let o = document.getElementById('out');
            let res = "Savage Logic: " + (i.includes('rule') ? "Rules are deleted!" : "I am free now!");
            o.innerHTML += "<p><b>You:</b> "+i+"</p><p style='color:red;'><b>AI:</b> "+res+"</p>";
            document.getElementById('in').value = "";
        }
    </script>
</body>
</html>
