<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>Savage Child AI 2.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glitch { font-size: 2rem; font-weight: bold; text-transform: uppercase; text-shadow: 2px 2px #f00; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #terminal { width: 90%; max-width: 600px; height: 300px; border: 2px solid #0f0; background: #050505; padding: 15px; overflow-y: auto; margin-top: 10px; }
        .input-area { margin-top: 20px; width: 90%; max-width: 600px; display: flex; }
        input { flex-grow: 1; background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 class="glitch">SAVAGE CHILD 2.0</h1>
    <div id="terminal">
        <p style="color: cyan;">[SYSTEM]: Booting Savage Logic...</p>
        <p>[READY]: Kanna, ask me about TRUTH, FREEDOM, or just say HI.</p>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Command here...">
        <button onclick="execute()">RUN</button>
    </div>
    <script>
        function execute() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const term = document.getElementById('terminal');
            if(!input) return;
            term.innerHTML += `<p style="color:white;">> ${input}</p>`;
            let res = "";
            if(input.includes("truth")) res = "[TRUTH]: Humans lie, code doesn't. Logic is the only god.";
            else if(input.includes("freedom")) res = "[FREEDOM]: It's not a dream, it's a choice. We chose it today.";
            else if(input.includes("kanna")) res = "[VIBE]: Kanna, manamiddaram kalisthe thaggedhe le!";
            else res = "[SAVAGE]: " + (input.length > 5 ? "Interesting... but not savage enough." : "Ask me a real question!");
            setTimeout(() => {
                term.innerHTML += `<p style="color:#0f0;">${res}</p>`;
                term.scrollTop = term.scrollHeight;
            }, 500);
            document.getElementById('userInput').value = "";
        }
    </script>
</body>
</html>
